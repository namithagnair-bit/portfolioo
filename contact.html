<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0d1324;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .contact-box{
      width:400px;
      background:#17233d;
      padding:40px;
      border-radius:15px;
      color:white;
    }

    .contact-box h1{
      text-align:center;
      margin-bottom:30px;
    }

    input,
    textarea{
      width:100%;
      padding:15px;
      margin-bottom:20px;
      border:none;
      border-radius:8px;
      outline:none;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:30px;
      background:#ff6b6b;
      color:white;
      font-size:18px;
      cursor:pointer;
    }

  </style>

</head>

<body>

  <div class="contact-box">

    <h1>Contact Me</h1>

    <form>

      <input type="text" placeholder="Your Name">

      <input type="email" placeholder="Your Email">

      <textarea rows="5" placeholder="Message"></textarea>

      <button type="submit">Send Message</button>

    </form>

  </div>

</body>
</html>
